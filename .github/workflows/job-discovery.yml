name: Job Discovery Bot

on:
  schedule:
    # Run four times a day: 10:00 AM, 2:00 PM, 6:00 PM, and 10:00 PM IST (4:30 AM, 8:30 AM, 12:30 PM, 4:30 PM UTC)
    - cron: '30 4,8,12,16 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install Discovery Dependencies
        working-directory: scripts/job-discovery
        run: pnpm install

      - name: Install Playwright Browsers
        working-directory: scripts/job-discovery
        run: npx playwright install --with-deps chromium

      - name: Cache Visited URLs
        uses: actions/cache@v4
        with:
          path: scripts/job-discovery/visited_urls.json
          key: visited-urls-${{ github.run_id }}
          restore-keys: |
            visited-urls-

      - name: Run Job Discovery Bot
        working-directory: scripts/job-discovery
        env:
          CDN_SIGNATURE_SECRET: ${{ secrets.CDN_SIGNATURE_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_CDN_URL: "https://cdn.fresherflow.in"
        run: pnpm start
