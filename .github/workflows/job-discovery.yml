name: Job Discovery Bot

on:
  schedule:
    # Run four times a day: 10:00 AM, 2:00 PM, 6:00 PM, and 10:00 PM IST (4:30 AM, 8:30 AM, 12:30 PM, 4:30 PM UTC)
    - cron: '30 4,8,12,16 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node
        with:
          install-playwright: 'true'

      - name: Install Discovery Dependencies
        working-directory: scripts/job-discovery
        run: pnpm install

      - name: Install Playwright Browsers
        working-directory: scripts/job-discovery
        run: pnpm exec playwright install --with-deps chromium


      - name: Cache Visited URLs
        uses: actions/cache@v4
        with:
          path: scripts/job-discovery/visited_urls.json
          key: visited-urls-${{ github.run_id }}
          restore-keys: |
            visited-urls-

      - name: Run Job Discovery Bot
        working-directory: scripts/job-discovery
        env:
          CDN_SIGNATURE_SECRET: ${{ secrets.CDN_SIGNATURE_SECRET }}
          NEXT_PUBLIC_CDN_URL: ${{ secrets.NEXT_PUBLIC_CDN_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: pnpm start

      - name: Verify Review Jobs
        working-directory: scripts/job-discovery
        run: npx tsx verify-reviews.ts

      - name: Upload Discovered Jobs Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovered-jobs
          path: |
            scripts/job-discovery/discovered_jobs.json
            scripts/job-discovery/review_jobs.json
          retention-days: 7
