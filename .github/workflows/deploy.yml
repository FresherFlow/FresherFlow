name: Monorepo CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Lint Check
        run: pnpm turbo lint --filter=fresherflow-api --filter=fresherflow-web

      - name: Type Check
        run: pnpm turbo typecheck --filter=fresherflow-api --filter=fresherflow-web

      - name: Build Applications
        run: pnpm turbo build --filter=fresherflow-api --filter=fresherflow-web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Tests
        run: pnpm --filter fresherflow-api test
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_ACCESS_SECRET: dummy_access_secret_for_tests_only
          JWT_REFRESH_SECRET: dummy_refresh_secret_for_tests_only
          REDIS_URL: redis://localhost:6379


      # Vercel auto-deploys via its own GitHub integration once CI is green.
