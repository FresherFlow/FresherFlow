name: Monorepo CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=@fresherflow/database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Lint Check
        run: npx turbo lint --filter=fresherflow-api --filter=fresherflow-web

      - name: Type Check
        run: npx turbo typecheck --filter=fresherflow-api --filter=fresherflow-web

      - name: Build Applications
        run: npx turbo build --filter=fresherflow-api --filter=fresherflow-web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Tests
        run: npm test --workspace=apps/api

      # Vercel auto-deploys via its own GitHub integration once CI is green.
