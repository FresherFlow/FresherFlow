name: Job Sweeper

on:
  schedule:
    # Run once a day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node


      - name: Install Sweeper Dependencies
        working-directory: scripts/sweeper
        run: pnpm install

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: scripts/sweeper
        run: npx playwright install --with-deps chromium

      - name: Install Playwright System Deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: scripts/sweeper
        run: npx playwright install-deps chromium

      - name: Run Job Sweeper
        working-directory: scripts/sweeper
        env:
          CDN_SIGNATURE_SECRET: ${{ secrets.CDN_SIGNATURE_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_CDN_URL: "https://cdn.fresherflow.in"
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: pnpm start
