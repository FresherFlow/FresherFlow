name: Social Auto-Post Seed

on:
  # Fire after job-discovery workflow succeeds (CDN feed is fresh)
  workflow_run:
    workflows: ["Scheduled Background Jobs"]
    types:
      - completed

  # Manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (skip on failure)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5
    steps:
      - name: Seed social posts via worker
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.WORKER_URL }}/social/seed" \
            -H "x-worker-secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            --fail-with-body
