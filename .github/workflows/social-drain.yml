name: Social Auto-Post Drain

on:
  # Drain 1 post every 30 minutes around the clock
  schedule:
    - cron: '*/30 * * * *'

  # Manual trigger
  workflow_dispatch:

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Drain 1 pending social post via worker
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.WORKER_URL }}/social/drain" \
            -H "x-worker-secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          # 200 is always success (even nothing_pending is a valid 200)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Worker returned non-200: $HTTP_CODE"
            exit 1
          fi
