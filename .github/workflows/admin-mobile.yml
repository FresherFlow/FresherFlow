name: Admin Mobile CI

on:
  push:
    paths:
      - 'apps/admin-mobile/**'
      - '.github/workflows/admin-mobile.yml'
  pull_request:
    paths:
      - 'apps/admin-mobile/**'

jobs:
  checks:
    name: Lint, Typecheck & Doctor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Checks
        run: npx turbo run lint typecheck --filter=admin-mobile

      - name: Expo doctor check
        run: cd apps/admin-mobile && npx expo-doctor
        continue-on-error: true
