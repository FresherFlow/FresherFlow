name: Admin Mobile CI

on:
  push:
    paths:
      - 'apps/admin-mobile/**'
      - '.github/workflows/admin-mobile.yml'
  pull_request:
    paths:
      - 'apps/admin-mobile/**'

jobs:
  checks:
    name: Lint, Typecheck & Doctor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Checks
        run: pnpm turbo run lint typecheck --filter=admin-mobile

      - name: Expo doctor check
        run: cd apps/admin-mobile && npx expo-doctor
        continue-on-error: true
