name: Setup Node.js + pnpm
description: Reusable composite action — checkout code, setup pnpm and Node.js 22 with cache.

runs:
  using: composite
  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: 'pnpm-lock.yaml'
