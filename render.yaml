services:

  # ── API ─────────────────────────────────────────────────────────────────────
  - type: web
    name: fresherflow-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run deploy:api   # generates prisma, migrates, builds
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false          # set in Render dashboard → Neon connection string
      - key: REDIS_URL
        fromService:
          type: redis
          name: fresherflow-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - package.json
        - package-lock.json

  # ── WORKER (runs as web service on free tier — binds health port) ────────────
  - type: web
    name: fresherflow-worker
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npx turbo run build --filter=fresherflow-worker
    startCommand: npm run start --workspace=apps/worker
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false          # same Neon connection string
      - key: REDIS_URL
        fromService:
          type: redis
          name: fresherflow-redis
          property: connectionString

  # ── REDIS ────────────────────────────────────────────────────────────────────
  - type: redis
    name: fresherflow-redis
    plan: free
    region: singapore
    ipAllowList: []
