services:
  - type: web
    name: api-fresherflow-user
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run deploy:api
    startCommand: npm run start:api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: APP_MODE
        value: user
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
  - type: web
    name: api-fresherflow-admin
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx turbo run db:generate --filter=fresherflow-api && npx turbo run build --filter=fresherflow-api
    startCommand: npm run start:api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: APP_MODE
        value: admin
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
